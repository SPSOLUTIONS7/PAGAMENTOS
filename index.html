<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro | Pagamento PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white antialiased">

    <div class="min-h-screen flex items-center justify-center p-6">
        <main class="w-full max-w-[450px]">
            
            <div class="checkout-card p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl">
                
                <header class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-cyan-500/10 rounded-2xl mb-4">
                        <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight">Checkout Digital</h1>
                    <p class="text-slate-400 text-sm mt-1">Pagamento instantâneo via PIX</p>
                </header>

                <div id="step-1" class="space-y-6">
                    <div class="relative group">
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Quanto deseja pagar?</label>
                        <div class="relative">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400 font-bold text-xl">R$</span>
                            <input type="number" id="valorInput" placeholder="0,00" 
                                class="input-field w-full pl-14 pr-5 py-5 bg-slate-900/50 border border-white/10 rounded-2xl text-2xl font-bold focus:outline-none transition-all">
                        </div>
                    </div>

                    <button onclick="gerarPixAnimado()" id="btnGerar" class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-extrabold rounded-2xl shadow-lg shadow-cyan-500/20 transition-all active:scale-95">
                        GERAR CÓDIGO PIX
                    </button>
                </div>

                <div id="step-2" class="hidden space-y-6 animate-fade-in">
                    <div class="p-6 bg-slate-900/80 border border-white/5 rounded-3xl text-center">
                        <p class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-4">Escaneie ou Copie</p>
                        
                        <div class="w-48 h-48 bg-white p-3 mx-auto rounded-xl mb-6 shadow-inner">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ExemploPIX" alt="QR Code" class="w-full h-full grayscale opacity-20">
                        </div>

                        <div class="relative">
                            <input type="text" id="pixCode" readonly value="00020126..." 
                                class="w-full bg-slate-950/50 border border-white/10 p-4 rounded-xl text-xs font-mono text-slate-400 pr-12">
                            <button onclick="copiarCodigo()" class="absolute right-3 top-1/2 -translate-y-1/2 text-cyan-400 hover:text-white transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <button onclick="voltar()" class="w-full py-4 text-slate-500 font-bold hover:text-slate-300 transition text-sm">
                        Alterar valor
                    </button>
                </div>

            </div>

            <footer class="mt-8 flex items-center justify-center gap-2 text-slate-600 text-xs uppercase tracking-widest font-bold">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                Ambiente Seguro & Criptografado
            </footer>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
